version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    reviewers:
      - "owner"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "build"
      prefix-scope: "deps"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "owner"
    labels:
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci"
      prefix-scope: "actions"
      include: "scope"
